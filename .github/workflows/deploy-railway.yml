name: Deploy Backend to Railway

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-railway.yml"

  workflow_dispatch:

concurrency:
  group: deploy-railway-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Trigger Railway Deploy Hook
    runs-on: ubuntu-latest
    steps:
      - name: Check Railway hook secret
        id: check_secret
        run: |
          if [ -z "${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping Railway deploy: missing secret RAILWAY_DEPLOY_HOOK_URL"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Railway deploy
        if: steps.check_secret.outputs.skip != 'true'
        run: |
          curl --fail --show-error --silent \
            -X POST \
            "${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}"
